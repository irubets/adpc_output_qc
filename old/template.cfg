# ─────────────────────────────────────────────────────────────
#  adnca_qc.cfg  —  Input file for adpc_output_qc_run.py
#
#  Usage:
#      python adpc_output_qc_run.py --input adnca_qc.cfg
#
#  Rules:
#    • Lines starting with # are comments
#    • Blank lines are ignored
#    • Values must not be quoted
#    • File paths may be absolute or relative to this file's location
# ─────────────────────────────────────────────────────────────

[sources]
# Required: the output ADNCA dataset (csv, xpt, or sas7bdat)
data    = /path/to/output/adnca.xpt

# Optional: the production SAS program (used to parse flag derivation logic)
sas     = /path/to/programs/adnca.sas

# Optional: the SAS log file (scanned for ERRORs and WARNINGs)
log     = /path/to/log/adnca.log

# Optional: the specifications Excel file (must contain an ADNCA or ADPC sheet)
specs   = /path/to/specs/Specifications.xlsx


[options]
# Phase filter: ALL (default), PHASE 1, or PHASE 2
phase   = ALL

# Set yes = true to skip all interactive confirmations
yes     = false


[mapping]
# Override auto-detected variable name mapping.
# Format: CANONICAL_NAME = ACTUAL_COLUMN_NAME_IN_DATASET
# Only needed when auto-detection fails or column names differ from standard.
# Lines for variables that auto-detect correctly can be deleted or left blank.
#
USUBJID   = USUBJID
PCTEST    = PCTEST
PCTESTCD  = PCTESTCD
AVISIT    = AVISIT
VISITCD   = VISITCD
NRRLT     = NRRLT
MRRLT     = MRRLT
AVAL      = AVAL
ARFTDTM   = ARFTDTM
NCA01FL   = NCA01FL
PKSUMXFL  = PKSUMXFL
DTYPE     = DTYPE
# ... add or remove lines as needed